<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Pro Fix</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.08);
  --text: white;
  --btn: #0ea5e9;
}

.light {
  --bg: #f1f5f9;
  --card: white;
  --text: #0f172a;
  --btn: #2563eb;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 500px;
  padding: 20px;
  border-radius: 20px;
  background: var(--card);
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: var(--btn);
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  font-size: 18px;
}

canvas {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>💱 Currency Pro (FIXED)</h2>

<button onclick="toggleTheme()">🌓 Тема</button>

<input type="number" id="amount" placeholder="Сумма">

<select id="from"></select>
<select id="to"></select>

<button onclick="convert()">Конвертировать</button>

<div class="result" id="result">Введите данные</div>

<canvas id="chart"></canvas>

</div>

<script>
const api = "https://api.frankfurter.app";

const currencies = ["USD","EUR","RUB","KZT","GBP","JPY","CNY","CHF"];

const from = document.getElementById("from");
const to = document.getElementById("to");

currencies.forEach(c => {
  from.innerHTML += `<option>${c}</option>`;
  to.innerHTML += `<option>${c}</option>`;
});

from.value = "KZT";
to.value = "USD";

let chart = null;

function toggleTheme(){
  document.body.classList.toggle("light");
}

async function convert() {
  let amount = document.getElementById("amount").value;

  if (!amount || amount <= 0) {
    document.getElementById("result").innerText = "Введи нормальную сумму";
    return;
  }

  let f = from.value;
  let t = to.value;

  try {
    const res = await fetch(`${api}/latest?amount=${amount}&from=${f}&to=${t}`);
    const data = await res.json();

    if (!data.rates || !data.rates[t]) {
      throw new Error("No rate");
    }

    let value = data.rates[t];

    document.getElementById("result").innerHTML =
      `${amount} ${f} = <b>${value.toFixed(2)} ${t}</b>`;

    drawChart(f, t);

  } catch (e) {
    document.getElementById("result").innerText =
      "Ошибка API. Попробуй позже или проверь интернет.";
    console.log(e);
  }
}

async function drawChart(f, t) {
  try {
    let labels = [];
    let values = [];

    for (let i = 7; i >= 1; i--) {
      let d = new Date();
      d.setDate(d.getDate() - i);
      let date = d.toISOString().split("T")[0];

      const res = await fetch(`${api}/${date}?from=${f}&to=${t}`);
      const data = await res.json();

      if (data.rates && data.rates[t]) {
        labels.push(date);
        values.push(data.rates[t]);
      }
    }

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: `${f} → ${t}`,
          data: values,
          borderWidth: 2
        }]
      }
    });

  } catch (e) {
    console.log("Chart error:", e);
  }
}
</script>

</body>
</html>
