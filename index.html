<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Universal Currency Converter</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e293b, #0ea5e9);
}

.container {
  width: 420px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  text-align: center;
}

h1 {
  font-size: 22px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #0ea5e9;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0284c7;
}

.result {
  margin-top: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <h1>💱 Универсальный конвертер</h1>

  <input type="number" id="amount" placeholder="Сумма" />

  <select id="from"></select>
  <select id="to"></select>

  <button onclick="convert()">Конвертировать</button>

  <div class="result" id="result">Результат появится здесь</div>
</div>

<script>
const api = "https://api.frankfurter.app/latest";

// список популярных валют
const currencies = [
  "USD","EUR","RUB","KZT","GBP","JPY","CNY","TRY","AED","CHF","CAD","AUD"
];

const from = document.getElementById("from");
const to = document.getElementById("to");

// заполняем select
currencies.forEach(cur => {
  from.innerHTML += `<option value="${cur}">${cur}</option>`;
  to.innerHTML += `<option value="${cur}">${cur}</option>`;
});

from.value = "KZT";
to.value = "USD";

async function convert() {
  let amount = document.getElementById("amount").value;
  let fromCur = from.value;
  let toCur = to.value;

  if (!amount) return;

  let url = `${api}?amount=${amount}&from=${fromCur}&to=${toCur}`;

  try {
    let res = await fetch(url);
    let data = await res.json();

    let result = data.rates[toCur];
    document.getElementById("result").innerHTML =
      `${amount} ${fromCur} = <b>${result.toFixed(2)} ${toCur}</b>`;
  } catch (e) {
    document.getElementById("result").innerHTML =
      "Ошибка загрузки курса 😢";
  }
}
</script>

</body>
</html>
