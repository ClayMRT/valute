<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Конвертер валют</title>

<style>
:root {
  --bg: linear-gradient(135deg, #0f172a, #1e293b, #0ea5e9);
  --card: rgba(255,255,255,0.08);
  --text: white;
  --input: rgba(255,255,255,0.12);
  --option-bg: #0f172a;
  --option-text: white;
}

.light {
  --bg: linear-gradient(135deg, #e2e8f0, #cbd5e1);
  --card: white;
  --text: #0f172a;
  --input: #f1f5f9;
  --option-bg: white;
  --option-text: #0f172a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  transition: 0.3s;
  padding: 20px;
}

.container {
  width: 420px;
  padding: 25px;
  border-radius: 20px;
  background: var(--card);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  color: var(--text);
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

button {
  margin-bottom: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: #0ea5e9;
  color: white;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  outline: none;
  background: var(--input);
  color: var(--text);
}

option {
  background: var(--option-bg);
  color: var(--option-text);
}

.result {
  margin-top: 15px;
  font-size: 18px;
}

/* 📊 таблица */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 12px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  font-size: 14px;
}

th {
  text-align: left;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<button onclick="toggleTheme()">🌙 / ☀️ Тема</button>

<h1>💱 Конвертер валют</h1>

<input type="number" id="amount" placeholder="Сумма" oninput="convert()" />

<select id="from" onchange="convert()">
  <option value="KZT">KZT</option>
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="RUB">RUB</option>
</select>

<select id="to" onchange="convert()">
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="RUB">RUB</option>
  <option value="KZT">KZT</option>
</select>

<div class="result" id="result">Введите данные</div>

<!-- 📊 ТАБЛИЦА -->
<table>
  <thead>
    <tr>
      <th>Валюта</th>
      <th>Курс к KZT</th>
    </tr>
  </thead>
  <tbody id="ratesTable"></tbody>
</table>

</div>

<script>

const api = "https://api.frankfurter.app/latest?from=KZT";

const rates = {
  KZT: 1,
  USD: 0.00216,
  EUR: 0.00185,
  RUB: 0.19
};

function convert() {
  let amount = parseFloat(document.getElementById("amount").value);
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!amount || amount <= 0) {
    document.getElementById("result").innerText = "Введите сумму";
    return;
  }

  let inKZT = amount / rates[from];
  let result = inKZT * rates[to];

  document.getElementById("result").innerHTML =
    `${amount} ${from} = <b>${result.toFixed(2)} ${to}</b>`;
}

// 📡 загрузка реальных курсов
async function loadRates() {
  try {
    let res = await fetch(api);
    let data = await res.json();

    let table = document.getElementById("ratesTable");
    table.innerHTML = "";

    let currencies = ["USD","EUR","RUB"];

    currencies.forEach(cur => {
      let value = data.rates[cur];

      table.innerHTML += `
        <tr>
          <td>${cur}</td>
          <td>${value ? value.toFixed(4) : "—"}</td>
        </tr>
      `;
    });

  } catch (e) {
    console.log("Ошибка загрузки курсов");
  }
}

function toggleTheme() {
  document.body.classList.toggle("light");
}

loadRates();

</script>

</body>
</html>
