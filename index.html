<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.08);
  --text: white;
  --btn: #0ea5e9;
}

.light {
  --bg: #f1f5f9;
  --card: white;
  --text: #0f172a;
  --btn: #2563eb;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  transition: 0.3s;
}

.container {
  width: 500px;
  padding: 20px;
  border-radius: 20px;
  background: var(--card);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: var(--btn);
  color: white;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
}

.result {
  margin-top: 10px;
  font-size: 18px;
}

canvas {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <div class="top">
    <h1>💱 Currency Pro</h1>
    <button onclick="toggleTheme()">🌓</button>
  </div>

  <input type="number" id="amount" placeholder="Сумма"/>

  <select id="from"></select>
  <select id="to"></select>

  <button onclick="convert()">Конвертировать</button>

  <div class="result" id="result"></div>

  <canvas id="chart"></canvas>
</div>

<script>
const api = "https://api.frankfurter.app";

const currencies = ["USD","EUR","RUB","KZT","GBP","JPY","CNY","TRY","CHF","CAD"];

const from = document.getElementById("from");
const to = document.getElementById("to");

currencies.forEach(c => {
  from.innerHTML += `<option>${c}</option>`;
  to.innerHTML += `<option>${c}</option>`;
});

from.value = "KZT";
to.value = "USD";

let chart;

function toggleTheme() {
  document.body.classList.toggle("light");
}

async function convert() {
  let amount = document.getElementById("amount").value;
  let f = from.value;
  let t = to.value;

  let res = await fetch(`${api}/latest?amount=${amount}&from=${f}&to=${t}`);
  let data = await res.json();

  let value = data.rates[t];

  document.getElementById("result").innerHTML =
    `${amount} ${f} = <b>${value.toFixed(2)} ${t}</b>`;

  drawChart(f, t);
}

// 📊 график за 7 дней
async function drawChart(fromCur, toCur) {
  let labels = [];
  let values = [];

  let today = new Date();

  for (let i = 7; i >= 1; i--) {
    let d = new Date();
    d.setDate(today.getDate() - i);
    let date = d.toISOString().split("T")[0];

    let res = await fetch(`${api}/${date}?from=${fromCur}&to=${toCur}`);
    let data = await res.json();

    labels.push(date);
    values.push(data.rates[toCur]);
  }

  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: `${fromCur} → ${toCur}`,
        data: values,
        borderWidth: 2,
        tension: 0.3
      }]
    }
  });
}
</script>

</body>
</html>
