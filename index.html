<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Конвертер валют</title>

<style>
:root {
  --bg: linear-gradient(135deg, #0f172a, #1e293b, #0ea5e9);
  --card: rgba(255,255,255,0.08);
  --text: white;
  --input: rgba(255,255,255,0.12);
  --btn: #0ea5e9;
}

.light {
  --bg: linear-gradient(135deg, #e2e8f0, #cbd5e1);
  --card: white;
  --text: #0f172a;
  --input: #f1f5f9;
  --btn: #2563eb;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  transition: 0.3s;
}

.container {
  width: 380px;
  padding: 25px;
  border-radius: 20px;
  background: var(--card);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  color: var(--text);
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

button {
  margin-bottom: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: var(--btn);
  color: white;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  outline: none;
  background: var(--input);
  color: var(--text);
}

.swap {
  margin-top: 10px;
  cursor: pointer;
  background: transparent;
  border: 1px solid var(--text);
}

.result {
  margin-top: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<button onclick="toggleTheme()">🌙 / ☀️ Тема</button>

<h1>💱 Конвертер валют</h1>

<input type="number" id="amount" placeholder="Сумма" oninput="convert()" />

<select id="from" onchange="convert()">
  <option value="KZT">KZT</option>
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="RUB">RUB</option>
</select>

<select id="to" onchange="convert()">
  <option value="USD">USD</option>
  <option value="EUR">EUR</option>
  <option value="RUB">RUB</option>
  <option value="KZT">KZT</option>
</select>

<button class="swap" onclick="swapCurrencies()">🔄 Поменять местами</button>

<div class="result" id="result">Введите данные</div>

</div>

<script>

// фиксированные курсы относительно KZT
const rates = {
  KZT: 1,
  USD: 0.00216,
  EUR: 0.00185,
  RUB: 0.19
};

function convert() {
  let amount = parseFloat(document.getElementById("amount").value);
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!amount || amount <= 0) {
    document.getElementById("result").innerText = "Введите сумму";
    return;
  }

  // перевод сначала в KZT
  let inKZT = amount / rates[from];

  // затем в нужную валюту
  let result = inKZT * rates[to];

  document.getElementById("result").innerHTML =
    `${amount} ${from} = <b>${result.toFixed(2)} ${to}</b>`;
}

function swapCurrencies() {
  let from = document.getElementById("from");
  let to = document.getElementById("to");

  let temp = from.value;
  from.value = to.value;
  to.value = temp;

  convert();
}

function toggleTheme() {
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
